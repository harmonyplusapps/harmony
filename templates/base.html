<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Harmony{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <script src="https://unpkg.com/htmx.org@2.0.0" defer></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  {% if user.is_authenticated %}
  <nav>
    <a href="{% url 'dashboard' %}">Harmony</a>
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}<button type="submit">Logout</button>
    </form>
  </nav>
  {% endif %}
  <main>
    {% if messages %}
      {% for message in messages %}<p class="message {{ message.tags }}">{{ message }}</p>{% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
